<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CD-107 PCP INTELIGÊNCIA PRO</title>

<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>

<style>
body{margin:0;font-family:Segoe UI;background:#0f172a;color:#fff}
header{padding:15px;background:#111827}
.container{padding:15px}
.box{background:#1e293b;padding:12px;border-radius:10px;margin-top:10px}
input,button{padding:6px;margin:3px;border-radius:6px;border:none}
button{background:#2563eb;color:#fff;cursor:pointer}
table{width:100%;border-collapse:collapse;font-size:13px}
th,td{border-bottom:1px solid #334155;padding:6px}
th{background:#111827}
small{color:#94a3b8}
.critico{color:#ef4444;font-weight:bold}
.kpi{display:flex;gap:15px;flex-wrap:wrap}
.kpi div{background:#0b1220;padding:10px;border-radius:8px}
</style>
</head>

<body>

<header>
<h2>📊 CD-107 PCP INTELIGÊNCIA PRO</h2>
</header>

<div class="container">

<!-- KPI -->
<div class="box kpi">
<div>📦 Total Itens: <b id="k_total">0</b></div>
<div>📍 Apanhas: <b id="k_apanha">0</b></div>
<div>🏭 Pulmões: <b id="k_pulmao">0</b></div>
</div>

<!-- UPLOADS -->
<div class="box">
<h3>Uploads</h3>
<input type="file" id="file1"> Comparativo<br>
<input type="file" id="file2"> Apanha<br>
<input type="file" id="file3"> Pulmão<br>
</div>

<!-- FILTROS -->
<div class="box">
<input id="f_codigo" placeholder="Código" oninput="filtrar()">
<input id="f_desc" placeholder="Descrição" oninput="filtrar()">
<input id="f_local" placeholder="Local" oninput="filtrar()">
<input id="f_valor" placeholder="Valor mín" oninput="filtrar()">
</div>

<!-- BOTÕES -->
<div class="box">
<button onclick="ordenar('maior')">Maior valor</button>
<button onclick="ordenar('menor')">Menor valor</button>
<button onclick="exportarExcel()">Excel</button>
<button onclick="imprimir()">Imprimir</button>
</div>

<!-- TABELA -->
<div class="box">
<table>
<thead>
<tr>
<th>Sel</th>
<th>Código</th>
<th>Descrição</th>
<th>Local</th>
<th>Qtd</th>
<th>Valor</th>
<th>Apanha</th>
<th>Pulmão</th>
</tr>
</thead>
<tbody id="tb"></tbody>
</table>
</div>

</div>

<script>

let base=[];
let view=[];
let apanha={};
let pulmao={};

function norm(v){
return String(v||'').trim().replace(/\s/g,'').replace(/^0+/,'');
}

/* =====================
COMPARATIVO (ROBUSTO)
===================== */
file1.onchange=e=>{
const r=new FileReader();
r.onload=ev=>{
const lines=ev.target.result.split(/\r?\n/);

base=[];

for(let i=1;i<lines.length;i++){
const c=lines[i].split(';');
if(c.length<8) continue;

const codigo = norm(c[0]);
if(!codigo) continue;

base.push({
codigo,
desc:c[1]||'',
local:c[2]||'',
qtd:parseFloat((c[6]||'0').replace(',','.'))||0,
valor:Math.abs(parseFloat((c[9]||'0').replace(',','.'))||0)
});
}

view=[...base];
updateKPIs();
render(view);
};
r.readAsText(e.target.files[0],'latin1');
};

/* =====================
APANHA
===================== */
file2.onchange=e=>{
const r=new FileReader();
r.onload=ev=>{
const lines=ev.target.result.split(/\r?\n/);
apanha={};

for(let i=1;i<lines.length;i++){
const c=lines[i].split(';');
if(c.length<6) continue;

const cod=norm(c[5]);
if(!cod) continue;

if(!apanha[cod]) apanha[cod]=[];
apanha[cod].push(c[0]);
}
updateKPIs();
render(view);
};
r.readAsText(e.target.files[0],'latin1');
};

/* =====================
PULMÃO
===================== */
file3.onchange=e=>{
const r=new FileReader();
r.onload=ev=>{
const lines=ev.target.result.split(/\r?\n/);
pulmao={};

for(let i=1;i<lines.length;i++){
const c=lines[i].split(';');
if(c.length<5) continue;

const cod=norm(c[5]);
if(!cod) continue;

if(!pulmao[cod]) pulmao[cod]=[];
pulmao[cod].push(1);
}
updateKPIs();
render(view);
};
r.readAsText(e.target.files[0],'latin1');
};

/* =====================
KPIs
===================== */
function updateKPIs(){

document.getElementById('k_total').innerText=base.length;

let a=0;
for(let k in apanha) a += apanha[k].length;
document.getElementById('k_apanha').innerText=a;

let p=0;
for(let k in pulmao) p += pulmao[k].length;
document.getElementById('k_pulmao').innerText=p;
}

/* =====================
RENDER
===================== */
function render(list){

const tb=document.getElementById('tb');
tb.innerHTML='';

list.forEach(x=>{

const ap=apanha[x.codigo]||[];
const pu=pulmao[x.codigo]||[];

tb.innerHTML+=`
<tr>
<td><input type="checkbox" value="${x.codigo}"></td>
<td>${x.codigo}</td>
<td>${x.desc}</td>
<td>${x.local}</td>
<td>${x.qtd}</td>
<td>${x.valor.toFixed(2)}</td>
<td>${ap.length?ap.length:'SEM APANHA'}</td>
<td>${pu.length}</td>
</tr>
`;
});
}

/* =====================
FILTRO
===================== */
function filtrar(){

const c=f_codigo.value.toLowerCase();
const d=f_desc.value.toLowerCase();
const l=f_local.value.toLowerCase();
const v=parseFloat(f_valor.value)||0;

view=base.filter(x=>
(!c||x.codigo.includes(c))&&
(!d||x.desc.toLowerCase().includes(d))&&
(!l||x.local.toLowerCase().includes(l))&&
(!v||x.valor>=v)
);

render(view);
}

/* =====================
ORDENAR
===================== */
function ordenar(tipo){

if(tipo==='maior')
view.sort((a,b)=>b.valor-a.valor);

if(tipo==='menor')
view.sort((a,b)=>a.valor-b.valor);

render(view);
}

/* =====================
PRINT SIMPLES
===================== */
function imprimir(){

window.print();
}

/* =====================
EXCEL
===================== */
function exportarExcel(){

const sel=[...document.querySelectorAll('input[type=checkbox]:checked')].map(x=>x.value);

const data=sel.map(c=>{
const x=base.find(b=>b.codigo===c);

return{
Codigo:c,
Descricao:x?.desc,
Apanha:(apanha[c]||[]).length,
Pulmao:(pulmao[c]||[]).length,
Valor:x?.valor
};
});

const ws=XLSX.utils.json_to_sheet(data);
const wb=XLSX.utils.book_new();
XLSX.utils.book_append_sheet(wb,ws,"Relatorio");
XLSX.writeFile(wb,"relatorio.xlsx");
}

</script>

</body>
</html>
