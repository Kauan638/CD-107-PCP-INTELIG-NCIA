<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CD-107 WMS ULTRA FIX</title>

<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>

<style>
body{margin:0;font-family:Segoe UI;background:#0b1220;color:#e5e7eb}
header{padding:14px;background:#111827;position:sticky;top:0}
.container{padding:14px;max-width:1400px;margin:auto}

.kpi{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:10px}
.kpi div{background:#111827;padding:12px;border-left:3px solid #2563eb;border-radius:8px}

.upload-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));gap:10px;margin-top:10px}
.upload{background:#0f172a;padding:12px;border:1px solid #1f2937;border-radius:10px}

.btn-upload{display:block;background:#2563eb;color:#fff;padding:10px;border-radius:8px;text-align:center;cursor:pointer}
input[type=file]{display:none}

.bar{height:6px;background:#1f2937;border-radius:10px;overflow:hidden;margin-top:8px}
.bar-fill{height:100%;width:0%;background:#22c55e}

.status{font-size:11px;color:#9ca3af;margin-top:4px}

table{width:100%;border-collapse:collapse;font-size:12px}
th{background:#111827;position:sticky;top:0;padding:10px}
td{padding:8px;border-bottom:1px solid #1f2937}

.table{margin-top:10px;border:1px solid #1f2937;border-radius:10px;overflow:auto}

button{background:#111827;border:1px solid #1f2937;color:#fff;padding:10px;border-radius:8px}
</style>
</head>

<body>

<header>📊 CD-107 WMS ULTRA FIX</header>

<div class="container">

<div class="kpi">
<div>📦 Itens <b id="k1">0</b></div>
<div>📍 Apanhas <b id="k2">0</b></div>
<div>🏭 Pulmões <b id="k3">0</b></div>
</div>

<div class="upload-grid">

<div class="upload">
<label class="btn-upload">Comparativo
<input id="file1" type="file">
</label>
<div class="bar"><div id="b1" class="bar-fill"></div></div>
<div id="s1" class="status">Aguardando</div>
</div>

<div class="upload">
<label class="btn-upload">Apanha
<input id="file2" type="file">
</label>
<div class="bar"><div id="b2" class="bar-fill"></div></div>
<div id="s2" class="status">Aguardando</div>
</div>

<div class="upload">
<label class="btn-upload">Pulmão
<input id="file3" type="file">
</label>
<div class="bar"><div id="b3" class="bar-fill"></div></div>
<div id="s3" class="status">Aguardando</div>
</div>

</div>

<div class="table">
<table>
<thead>
<tr>
<th>Cód</th><th>Desc</th><th>Local</th><th>Qtd</th><th>Valor</th><th>Apanha</th><th>Pulmão</th>
</tr>
</thead>
<tbody id="tb"></tbody>
</table>
</div>

</div>

<script>

let base=[],view=[];
let apanha={},pulmao={};

const sleep = () => new Promise(r=>setTimeout(r,0));

function norm(v){
return String(v||'').trim().replace(/\s/g,'');
}

/* =========================
COMPARATIVO ULTRA FIX (SEM 99%)
========================= */
document.getElementById('file1').addEventListener('change', async e=>{

const text = await e.target.files[0].text();
const lines = text.split(/\r?\n/);

base = [];
const total = lines.length;

for(let i=1;i<total;i++){

const c = lines[i].split(';');
if(c.length<8) continue;

base.push({
codigo:norm(c[0]),
desc:c[1],
local:c[2],
qtd:+(c[6]||0),
valor:Math.abs(+(c[9]||0))
});

/* PROGRESSO ESTÁVEL */
if(i % 500 === 0){
const pct = Math.floor((i/total)*100);

document.getElementById('b1').style.width=pct+'%';
document.getElementById('s1').innerText='Processando '+pct+'%';

/* 🔥 EVITA FREEZE DO ÚLTIMO FRAME */
await sleep();
}
}

/* 🔥 FORÇA FINALIZAÇÃO REAL DO BROWSER */
await sleep();

view=[...base];
render();
kpi();

/* FINALIZA 100% SEM TRAVAR */
requestAnimationFrame(()=>{
document.getElementById('b1').style.width='100%';
document.getElementById('s1').innerText='Concluído ✔';
});

});

/* =========================
APANHA
========================= */
document.getElementById('file2').addEventListener('change', async e=>{

const text = await e.target.files[0].text();
const lines = text.split(/\r?\n/);

apanha={};

for(let i=1;i<lines.length;i++){
const c=lines[i].split(';');
if(c.length<6)continue;

const cod=norm(c[5]);
if(!cod)continue;

apanha[cod]=apanha[cod]||[];
apanha[cod].push(1);
}

kpi();
document.getElementById('b2').style.width='100%';
document.getElementById('s2').innerText='OK';

});

/* =========================
PULMÃO
========================= */
document.getElementById('file3').addEventListener('change', async e=>{

const text = await e.target.files[0].text();
const lines = text.split(/\r?\n/);

pulmao={};

for(let i=1;i<lines.length;i++){
const c=lines[i].split(';');
if(c.length<6)continue;

const cod=norm(c[5]);
if(!cod)continue;

pulmao[cod]=pulmao[cod]||[];
pulmao[cod].push(1);
}

kpi();
document.getElementById('b3').style.width='100%';
document.getElementById('s3').innerText='OK';

});

/* =========================
RENDER
========================= */
function render(){
const tb=document.getElementById('tb');
tb.innerHTML='';

view.forEach(x=>{
tb.innerHTML+=`
<tr>
<td>${x.codigo}</td>
<td>${x.desc}</td>
<td>${x.local}</td>
<td>${x.qtd}</td>
<td>${x.valor.toFixed(2)}</td>
<td>${apanha[x.codigo]?.length||'SEM'}</td>
<td>${pulmao[x.codigo]?.length||'SEM'}</td>
</tr>`;
});
}

function kpi(){
document.getElementById('k1').innerText=base.length;

let a=0,p=0;
for(let k in apanha)a+=apanha[k].length;
for(let k in pulmao)p+=pulmao[k].length;

document.getElementById('k2').innerText=a;
document.getElementById('k3').innerText=p;
}

</script>

</body>
</html>
