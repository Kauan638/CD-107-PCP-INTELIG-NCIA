<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CD-107 WMS FINAL PRO</title>

<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>

<style>
body{margin:0;font-family:Segoe UI;background:#0b1220;color:#e5e7eb}

header{
padding:14px;
background:#111827;
position:sticky;
top:0;
font-weight:bold;
}

.container{padding:14px;max-width:1400px;margin:auto}

.kpi{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(160px,1fr));
gap:10px;
margin-top:10px;
}

.kpi div{
background:#111827;
padding:12px;
border-radius:8px;
border:1px solid #1f2937;
}

.upload{
margin-top:10px;
background:#0f172a;
padding:12px;
border:1px solid #1f2937;
border-radius:10px;
}

.bar{
height:6px;
background:#1f2937;
border-radius:10px;
overflow:hidden;
margin-top:6px;
}

.bar-fill{
height:100%;
width:0%;
background:#22c55e;
}

input,select{
padding:10px;
margin-top:8px;
background:#111827;
border:1px solid #1f2937;
color:#fff;
border-radius:8px;
width:100%;
}

.filters{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
gap:8px;
margin-top:10px;
}

.actions{
margin-top:10px;
display:flex;
gap:8px;
flex-wrap:wrap;
}

button{
background:#111827;
border:1px solid #1f2937;
color:#fff;
padding:8px 12px;
border-radius:8px;
cursor:pointer;
}

button:hover{opacity:.85}

.table{
margin-top:10px;
border:1px solid #1f2937;
border-radius:10px;
overflow:auto;
max-height:500px;
}

table{
width:100%;
border-collapse:collapse;
font-size:12px;
}

th{
position:sticky;
top:0;
background:#111827;
padding:10px;
cursor:pointer;
}

td{
padding:8px;
border-bottom:1px solid #1f2937;
}
</style>
</head>

<body>

<header>📊 CD-107 WMS FINAL PRO</header>

<div class="container">

<!-- KPI -->
<div class="kpi">
<div>📦 Itens: <b id="k1">0</b></div>
<div>📍 Apanhas: <b id="k2">0</b></div>
<div>🏭 Pulmões: <b id="k3">0</b></div>
</div>

<!-- UPLOADS -->
<div class="upload">
<input type="file" id="file1">
<div class="bar"><div id="b1" class="bar-fill"></div></div>
<small>Comparativo</small>
</div>

<div class="upload">
<input type="file" id="file2">
<div class="bar"><div id="b2" class="bar-fill"></div></div>
<small>Apanha</small>
</div>

<div class="upload">
<input type="file" id="file3">
<div class="bar"><div id="b3" class="bar-fill"></div></div>
<small>Pulmão</small>
</div>

<!-- FILTROS -->
<div class="filters">
<input id="f_codigo" placeholder="Código">
<input id="f_desc" placeholder="Descrição">
<input id="f_local" placeholder="Local">
<input id="f_min" placeholder="Valor mínimo">
<input id="f_max" placeholder="Valor máximo">
</div>

<!-- AÇÕES -->
<div class="actions">
<button onclick="ordenar('az')">A-Z</button>
<button onclick="ordenar('za')">Z-A</button>
<button onclick="ordenar('maior')">Maior valor</button>
<button onclick="ordenar('menor')">Menor valor</button>
<button onclick="exportar()">Excel</button>
<button onclick="imprimir()">Imprimir</button>
</div>

<!-- TABELA -->
<div class="table">
<table>
<thead>
<tr>
<th>Código</th>
<th>Descrição</th>
<th>Local</th>
<th>Qtd</th>
<th>Valor</th>
<th>Apanha</th>
<th>Pulmão</th>
</tr>
</thead>
<tbody id="tb"></tbody>
</table>
</div>

</div>

<script>

let base = [];
let view = [];
let apanha = {};
let pulmao = {};

function parseBR(v){
return parseFloat(String(v||0).replace(/\./g,'').replace(',','.'))||0;
}

/* =========================
COMPARATIVO
========================= */
document.getElementById('file1').addEventListener('change', async e=>{

const text = await e.target.files[0].text();
const lines = text.split(/\r?\n/);

base = [];

for(let i=1;i<lines.length;i++){
const c = lines[i].split(';');
if(c.length < 10) continue;

base.push({
codigo:c[0],
desc:c[1],
local:c[2],
qtd:parseBR(c[6]),
valor:parseBR(c[9])
});
}

view = [...base];
render();
kpi();

document.getElementById('b1').style.width='100%';
});

/* =========================
APANHA
========================= */
document.getElementById('file2').addEventListener('change', async e=>{

const text = await e.target.files[0].text();
const lines = text.split(/\r?\n/);

apanha = {};

for(let i=1;i<lines.length;i++){
const c = lines[i].split(';');
if(c.length < 6) continue;

const cod = c[5];
apanha[cod] = (apanha[cod]||0)+1;
}

kpi();
document.getElementById('b2').style.width='100%';
});

/* =========================
PULMÃO
========================= */
document.getElementById('file3').addEventListener('change', async e=>{

const text = await e.target.files[0].text();
const lines = text.split(/\r?\n/);

pulmao = {};

for(let i=1;i<lines.length;i++){
const c = lines[i].split(';');
if(c.length < 6) continue;

const cod = c[5];
pulmao[cod] = (pulmao[cod]||0)+1;
}

kpi();
document.getElementById('b3').style.width='100%';
});

/* =========================
FILTROS
========================= */
function aplicarFiltros(){

const cod = document.getElementById('f_codigo').value.toLowerCase();
const desc = document.getElementById('f_desc').value.toLowerCase();
const local = document.getElementById('f_local').value.toLowerCase();
const min = parseBR(document.getElementById('f_min').value);
const max = parseBR(document.getElementById('f_max').value);

view = base.filter(x=>{

return (
(!cod || x.codigo.toLowerCase().includes(cod)) &&
(!desc || x.desc.toLowerCase().includes(desc)) &&
(!local || x.local.toLowerCase().includes(local)) &&
(!min || x.valor >= min) &&
(!max || x.valor <= max)
);

});

render();
}

document.querySelectorAll('input').forEach(i=>{
i.addEventListener('keyup', aplicarFiltros);
});

/* =========================
ORDENAÇÃO
========================= */
function ordenar(tipo){

if(tipo==='az') view.sort((a,b)=>a.codigo.localeCompare(b.codigo));
if(tipo==='za') view.sort((a,b)=>b.codigo.localeCompare(a.codigo));
if(tipo==='maior') view.sort((a,b)=>b.valor-a.valor);
if(tipo==='menor') view.sort((a,b)=>a.valor-b.valor);

render();
}

/* =========================
RENDER
========================= */
function render(){

let html='';

for(let i=0;i<view.length;i++){
const x=view[i];

html += `
<tr>
<td>${x.codigo}</td>
<td>${x.desc}</td>
<td>${x.local}</td>
<td>${x.qtd}</td>
<td>${x.valor.toFixed(2)}</td>
<td>${apanha[x.codigo]||'SEM'}</td>
<td>${pulmao[x.codigo]||'SEM'}</td>
</tr>`;
}

document.getElementById('tb').innerHTML = html;
}

/* =========================
KPI
========================= */
function kpi(){

document.getElementById('k1').innerText = base.length;

let a=0,p=0;
for(let k in apanha)a+=apanha[k];
for(let k in pulmao)p+=pulmao[k];

document.getElementById('k2').innerText = a;
document.getElementById('k3').innerText = p;
}

/* =========================
EXPORT
========================= */
function exportar(){

const data = view.map(x=>({
Codigo:x.codigo,
Descricao:x.desc,
Local:x.local,
Qtd:x.qtd,
Valor:x.valor,
Apanha:apanha[x.codigo]||0,
Pulmao:pulmao[x.codigo]||0
}));

const ws = XLSX.utils.json_to_sheet(data);
const wb = XLSX.utils.book_new();
XLSX.utils.book_append_sheet(wb,ws,"CD107");
XLSX.writeFile(wb,"CD107.xlsx");
}

/* =========================
IMPRIMIR
========================= */
function imprimir(){
window.print();
}

</script>

</body>
</html>
