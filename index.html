<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CD-107 PCP INTELIGÊNCIA PRO</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Segoe UI',sans-serif;
}

body{
background:#0f172a;
color:white;
}

header{
background:#111827;
padding:15px;
border-bottom:1px solid #1f2937;
}

.container{
padding:15px;
}

.box{
background:#1e293b;
padding:12px;
border-radius:10px;
margin-top:10px;
}

input,button{
padding:8px;
margin:3px;
border:none;
border-radius:6px;
}

button{
background:#2563eb;
color:white;
cursor:pointer;
}

button:hover{
opacity:.9;
}

table{
width:100%;
border-collapse:collapse;
font-size:13px;
}

th,td{
padding:6px;
border-bottom:1px solid #334155;
}

th{
background:#111827;
}

.critico{color:#ef4444;font-weight:bold;}

small{color:#94a3b8}

</style>
</head>

<body>

<header>
<h2>📊 CD-107 PCP INTELIGÊNCIA PRO</h2>
</header>

<div class="container">

<!-- UPLOADS -->
<div class="box">
<h3>📥 Importação de Arquivos</h3>

<div>
<strong>1️⃣ Comparativo de Estoque</strong><br>
<small>Base principal (códigos, quantidades e valores)</small><br>
<input type="file" id="file1">
</div>

<div>
<strong>2️⃣ Apanha (Ruas Fixas)</strong><br>
<small>Endereços de separação</small><br>
<input type="file" id="file2">
</div>

<div>
<strong>3️⃣ Pulmões</strong><br>
<small>Estoque do CD</small><br>
<input type="file" id="file3">
</div>

</div>

<!-- FILTROS -->
<div class="box">

<input id="f_codigo" placeholder="Código" oninput="filtrar()">
<input id="f_desc" placeholder="Descrição" oninput="filtrar()">
<input id="f_local" placeholder="Local" oninput="filtrar()">
<input id="f_qtd" placeholder="Qtd mín" oninput="filtrar()">
<input id="f_valor" placeholder="Valor mín" oninput="filtrar()">
<input id="f_pulmao" placeholder="Nº pulmões" oninput="filtrar()">

</div>

<!-- AÇÕES -->
<div class="box">

<button onclick="ordenar('valor')">Maior valor</button>
<button onclick="ordenar('codigo')">Código A-Z</button>
<button onclick="exportarExcel()">Excel</button>
<button onclick="imprimirRelatorio()">Imprimir Relatório</button>

</div>

<!-- TABELA -->
<div class="box">

<table>
<thead>
<tr>
<th><input type="checkbox" onclick="toggleAll(this)"></th>
<th>Código</th>
<th>Descrição</th>
<th>Local</th>
<th>Qtd</th>
<th>Valor</th>
<th>Pulmões</th>
</tr>
</thead>

<tbody id="tb"></tbody>

</table>

</div>

</div>

<script>

/* =========================
BASES
========================= */
let base=[];
let view=[];
let apanha={};
let pulmao={};

/* =========================
NORMALIZAÇÃO
========================= */
function norm(v){
return String(v||'')
.trim()
.replace(/\s/g,'')
.replace(/^0+/,'');
}

/* =========================
FILE 1
========================= */
file1.onchange=e=>{
const r=new FileReader();
r.onload=ev=>{
const lines=ev.target.result.split(/\r?\n/);

base=[];

for(let i=1;i<lines.length;i++){
const c=lines[i].split(';');
if(c.length<10)continue;

base.push({
codigo:norm(c[0]),
desc:c[1],
local:c[2],
qtd:parseFloat(String(c[6]).replace(',','.'))||0,
valor:parseFloat(String(c[9]).replace(',','.'))||0
});
}

view=[...base];
render(view);
};
r.readAsText(e.target.files[0],'latin1');
};

/* =========================
FILE 2 APANHA
========================= */
file2.onchange=e=>{
const r=new FileReader();
r.onload=ev=>{
const lines=ev.target.result.split(/\r?\n/);
apanha={};

for(let i=1;i<lines.length;i++){
const c=lines[i].split(';');
if(c.length<6)continue;

const cod=norm(c[5]);
if(!apanha[cod])apanha[cod]=[];
apanha[cod].push(c[0]);
}
};
r.readAsText(e.target.files[0],'latin1');
};

/* =========================
FILE 3 PULMÃO
========================= */
file3.onchange=e=>{
const r=new FileReader();
r.onload=ev=>{
const lines=ev.target.result.split(/\r?\n/);
pulmao={};

for(let i=1;i<lines.length;i++){
const c=lines[i].split(';');
if(c.length<7)continue;

const cod=norm(c[5]);
if(!pulmao[cod])pulmao[cod]=[];
pulmao[cod].push(`${c[1]}-${c[2]}-${c[3]}-${c[4]}`);
}
};
r.readAsText(e.target.files[0],'latin1');
};

/* =========================
RENDER
========================= */
function render(list){

const tb=document.getElementById('tb');
tb.innerHTML='';

list.forEach(x=>{

const tr=document.createElement('tr');

tr.innerHTML=`
<td><input type="checkbox" class="chk" value="${x.codigo}"></td>
<td>${x.codigo}</td>
<td>${x.desc}</td>
<td>${x.local}</td>
<td>${x.qtd}</td>
<td>${x.valor.toLocaleString('pt-BR',{style:'currency',currency:'BRL'})}</td>
<td>${(pulmao[x.codigo]||[]).length}</td>
`;

tb.appendChild(tr);
});
}

/* =========================
FILTRO COMPLETO
========================= */
function filtrar(){

const c=f_codigo.value.toLowerCase();
const d=f_desc.value.toLowerCase();
const l=f_local.value.toLowerCase();
const q=parseFloat(f_qtd.value)||null;
const v=parseFloat(f_valor.value)||null;
const p=parseInt(f_pulmao.value)||null;

view=base.filter(x=>{

const qtdPulmao=(pulmao[x.codigo]||[]).length;

return (
(!c||x.codigo.includes(c)) &&
(!d||x.desc.toLowerCase().includes(d)) &&
(!l||x.local.toLowerCase().includes(l)) &&
(!q||x.qtd>=q) &&
(!v||x.valor>=v) &&
(!p||qtdPulmao==p)
);

});

render(view);
}

/* =========================
SELECIONAR TODOS
========================= */
function toggleAll(el){
document.querySelectorAll('.chk').forEach(c=>{
c.checked=el.checked;
});
}

/* =========================
ORDENAR
========================= */
function ordenar(t){

let d=[...view];

if(t=='valor')d.sort((a,b)=>b.valor-a.valor);
if(t=='codigo')d.sort((a,b)=>a.codigo.localeCompare(b.codigo));

render(d);
}

/* =========================
EXPORT EXCEL
========================= */
function exportarExcel(){

const sel=[...document.querySelectorAll('.chk:checked')].map(x=>x.value);

if(!sel.length)return alert('Selecione itens');

const data=sel.map(cod=>{
const x=base.find(i=>i.codigo==cod);

return{
Codigo:cod,
Descricao:x.desc,
Local:x.local,
Qtd:x.qtd,
Valor:x.valor,
Apanha:(apanha[cod]||[]).join('|'),
Pulmao:(pulmao[cod]||[]).join('|'),
Pulmoes:(pulmao[cod]||[]).length
};
});

const ws=XLSX.utils.json_to_sheet(data);
const wb=XLSX.utils.book_new();
XLSX.utils.book_append_sheet(wb,ws,'Relatorio');
XLSX.writeFile(wb,'relatorio.xlsx');
}

/* =========================
IMPRIMIR (CORRIGIDO APANHA)
========================= */
function imprimirRelatorio(){

const sel=[...document.querySelectorAll('.chk:checked')].map(x=>x.value);

if(!sel.length)return alert('Selecione itens');

let w=window.open('','_blank');

let html=`
<html>
<head>
<title>Relatório CD-107</title>
<style>
body{font-family:Arial;padding:20px}
.item{border:1px solid #ccc;margin:10px;padding:10px}
h2{background:#eee;padding:5px}
</style>
</head>
<body>
<h1>RELATÓRIO CD-107 PCP</h1>
`;

sel.forEach(cod=>{
const x=base.find(i=>i.codigo==cod);

html+=`
<div class="item">
<h2>${cod} - ${x.desc}</h2>
<p>Local: ${x.local}</p>
<p>Qtd: ${x.qtd}</p>
<p>Valor: ${x.valor}</p>

<p><b>Apanha:</b> ${
apanha[norm(cod)] && apanha[norm(cod)].length
? apanha[norm(cod)].join(', ')
: 'SEM APANHA'
}</p>
<p><b>Pulmão:</b> ${(pulmao[cod]||[]).length ? pulmao[cod].join(', ') : 'SEM PULMÃO'}</p>

</div>
`;
});

html+=`</body></html>`;

w.document.write(html);
w.document.close();
w.print();
}

</script>

</body>
</html>
