<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CD-107 WMS Auditoria PRO</title>

<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>

<style>

body{
margin:0;
font-family:Segoe UI;
background:#0f172a;
color:white;
display:flex;
}

.sidebar{
width:260px;
background:#111827;
padding:15px;
height:100vh;
overflow:auto;
}

.main{
flex:1;
padding:20px;
}

.btn{
width:100%;
padding:10px;
margin:5px 0;
background:#1e293b;
border:none;
color:white;
border-radius:8px;
cursor:pointer;
text-align:left;
}

.btn:hover{background:#2563eb}

table{
width:100%;
border-collapse:collapse;
font-size:13px;
margin-top:10px;
}

th,td{
padding:8px;
border-bottom:1px solid #334155;
}

tr:hover{background:#1e293b}

.filters input{
padding:6px;
margin:3px;
border-radius:6px;
border:none;
}

</style>
</head>

<body>

<div class="sidebar">

<h3>📥 Uploads</h3>
<input type="file" id="file1">
<input type="file" id="file2">
<input type="file" id="file3">

<button class="btn" onclick="exportarExcel()">📤 Excel</button>
<button class="btn" onclick="imprimirRelatorio()">🖨️ Imprimir Relatório</button>

<h3>🔃 Ordenação</h3>

<button class="btn" onclick="ordenar('valor')">Maior valor</button>
<button class="btn" onclick="ordenar('valorDesc')">Menor valor</button>

</div>

<div class="main">

<h2>CD-107 WMS Auditoria</h2>

<div class="filters">

<input id="f_codigo" placeholder="Código" oninput="filtrar()">
<input id="f_desc" placeholder="Descrição" oninput="filtrar()">
<input id="f_pulmao" placeholder="Nº pulmões" oninput="filtrar()">

</div>

<table>
<thead>
<tr>
<th><input type="checkbox" id="checkAll" onclick="toggleAll(this)"></th>
<th>Código</th>
<th>Descrição</th>
<th>Local</th>
<th>Valor</th>
<th>Pulmões</th>
</tr>
</thead>
<tbody id="tb"></tbody>
</table>

</div>

<script>

let dados=[];
let apanha={};
let pulmao={};
let base=[];

/* NORMALIZAÇÃO */
function norm(v){
return String(v||'').trim().replace(/^0+/,'');
}

/* FILE 1 */
file1.onchange=e=>{
const r=new FileReader();
r.onload=ev=>{
const lines=ev.target.result.split(/\r?\n/);
dados=[];
for(let i=1;i<lines.length;i++){
const c=lines[i].split(';');
if(c.length<10)continue;

dados.push({
codigo:norm(c[0]),
desc:c[1],
local:c[2],
valor:parseFloat(String(c[9]).replace(',','.'))||0
});
}
base=dados;
render(dados);
};
r.readAsText(e.target.files[0],'latin1');
};

/* FILE 2 */
file2.onchange=e=>{
const r=new FileReader();
r.onload=ev=>{
const lines=ev.target.result.split(/\r?\n/);
apanha={};
for(let i=1;i<lines.length;i++){
const c=lines[i].split(';');
if(c.length<6)continue;

const cod=norm(c[5]);
if(!apanha[cod])apanha[cod]=[];
apanha[cod].push(c[0]);
}
};
r.readAsText(e.target.files[0],'latin1');
};

/* FILE 3 */
file3.onchange=e=>{
const r=new FileReader();
r.onload=ev=>{
const lines=ev.target.result.split(/\r?\n/);
pulmao={};
for(let i=1;i<lines.length;i++){
const c=lines[i].split(';');
if(c.length<7)continue;

const cod=norm(c[5]);
if(!pulmao[cod])pulmao[cod]=[];
pulmao[cod].push(c[1]+'-'+c[2]+'-'+c[3]+'-'+c[4]);
}
};
r.readAsText(e.target.files[0],'latin1');
};

/* RENDER */
function render(list){

const tb=document.getElementById('tb');
tb.innerHTML='';

list.forEach(x=>{
const tr=document.createElement('tr');

tr.innerHTML=`
<td><input type="checkbox" class="chk" value="${x.codigo}"></td>
<td>${x.codigo}</td>
<td>${x.desc}</td>
<td>${x.local}</td>
<td>${x.valor.toLocaleString('pt-BR',{style:'currency',currency:'BRL'})}</td>
<td>${(pulmao[x.codigo]||[]).length}</td>
`;

tb.appendChild(tr);
});

}

/* FILTRO */
function filtrar(){

const c=f_codigo.value.toLowerCase();
const d=f_desc.value.toLowerCase();
const p=parseInt(f_pulmao.value)||null;

const f=base.filter(x=>{

const qtd=(pulmao[x.codigo]||[]).length;

return (
(!c||x.codigo.includes(c)) &&
(!d||x.desc.toLowerCase().includes(d)) &&
(!p||qtd==p)
);

});

render(f);
}

/* TOGGLE ALL */
function toggleAll(el){

document.querySelectorAll('.chk').forEach(cb=>{
cb.checked=el.checked;
});

}

/* ORDENAR */
function ordenar(t){

let d=[...base];

if(t==='valor')d.sort((a,b)=>b.valor-a.valor);
if(t==='valorDesc')d.sort((a,b)=>a.valor-b.valor);

render(d);
}

/* EXPORT EXCEL */
function exportarExcel(){

const sel=[...document.querySelectorAll('.chk:checked')].map(x=>x.value);

if(!sel.length)return alert('Selecione itens');

const data=sel.map(cod=>{
const x=base.find(i=>i.codigo==cod);

return{
Codigo:cod,
Descricao:x.desc,
Local:x.local,
Valor:x.valor,
Pulmoes:(pulmao[cod]||[]).length,
Apanha:(apanha[cod]||[]).join('|'),
Pulmao:(pulmao[cod]||[]).join('|')
};
});

const ws=XLSX.utils.json_to_sheet(data);
const wb=XLSX.utils.book_new();
XLSX.utils.book_append_sheet(wb,ws,'Relatorio');
XLSX.writeFile(wb,'relatorio.xlsx');
}

/* IMPRESSÃO CORRIGIDA */
function imprimirRelatorio(){

const sel=[...document.querySelectorAll('.chk:checked')].map(x=>x.value);

if(!sel.length){
alert('Selecione itens');
return;
}

let win=window.open('','_blank');

let html=`
<html>
<head>
<title>Relatório WMS</title>
<style>
body{font-family:Arial;padding:20px}
.item{border:1px solid #ccc;margin:10px 0;padding:10px}
h2{background:#eee;padding:10px}
</style>
</head>
<body>
<h1>RELATÓRIO WMS AUDITORIA</h1>
`;

sel.forEach(cod=>{
const x=base.find(i=>i.codigo==cod);

html+=`
<div class="item">
<h2>${cod} - ${x.desc}</h2>
<p>Local: ${x.local}</p>
<p>Valor: ${x.valor}</p>
<p>Apanha: ${(apanha[cod]||[]).join(', ')}</p>
<p>Pulmão: ${(pulmao[cod]||[]).join(', ')}</p>
</div>
`;
});

html+=`</body></html>`;

win.document.write(html);
win.document.close();
win.print();
}

</script>

</body>
</html>
