<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CD-107 WMS FINAL PRO</title>

<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>

<style>
body{margin:0;font-family:'Segoe UI',sans-serif;background:linear-gradient(135deg,#0b1220,#111827);color:#e5e7eb}
header{padding:20px;background:#0f172a;position:sticky;top:0;font-size:28px;font-weight:700;border-bottom:1px solid #1f2937;box-shadow:0 2px 15px rgba(0,0,0,.3)}
.container{padding:20px;max-width:1600px;margin:auto}
.kpi{display:grid;grid-template-columns:repeat(auto-fit,minmax(250px,1fr));gap:15px;margin-top:20px}
.kpi div{background:#111827;padding:20px;border-radius:16px;border:1px solid #1f2937;font-size:24px;font-weight:600;transition:.3s}
.kpi div:hover{transform:translateY(-4px)}
.upload{margin-top:15px;background:#111827;padding:18px;border:1px solid #1f2937;border-radius:16px}
input,select{padding:12px;background:#0f172a;border:1px solid #374151;color:white;border-radius:10px;width:100%;box-sizing:border-box}
.filters{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:10px;margin-top:20px}
.actions{margin-top:20px;display:flex;gap:10px;flex-wrap:wrap}
button{background:#2563eb;border:none;color:white;padding:12px 18px;border-radius:10px;cursor:pointer}
button:hover{background:#1d4ed8}
.table{margin-top:20px;border-radius:16px;overflow:auto;max-height:600px;background:#111827}
table{width:100%;border-collapse:collapse}
th{position:sticky;top:0;background:#1e293b;padding:14px}
td{padding:12px;border-bottom:1px solid #1f2937}
tr:hover{background:#1e293b}
.chk{transform:scale(1.2)}
.progress{width:100%;height:8px;background:#1f2937;border-radius:20px;margin-top:12px;overflow:hidden}
.progress-bar{width:0%;height:100%;background:linear-gradient(90deg,#3b82f6,#60a5fa);transition:width .4s ease}
</style>
</head>

<body>

<header>📊 CD-107 WMS FINAL PRO<div style="font-size:14px;font-weight:400;color:#94a3b8;margin-top:5px;">Auditoria Inteligente de Estoque</div></header>

<div class="container">

<div class="kpi">
<div>📦 Itens: <b id="k1">0</b></div>
<div>📍 Apanhas: <b id="k2">0</b></div>
<div>🏭 Pulmões: <b id="k3">0</b></div>
</div>

<div class="upload">
<input type="file" id="file1">
<small>📦 Comparativo</small><div class="progress"><div class="progress-bar" id="prog1"></div></div>
</div>

<div class="upload">
<input type="file" id="file2">
<small>📍 Apanha</small><div class="progress"><div class="progress-bar" id="prog2"></div></div>
</div>

<div class="upload">
<input type="file" id="file3">
<small>🏭 Pulmão</small><div class="progress"><div class="progress-bar" id="prog3"></div></div>
</div>

<div class="filters">
<input id="f_codigo" placeholder="Código">
<input id="f_desc" placeholder="Descrição">
<input id="f_local" placeholder="Local">
<input id="f_min" placeholder="Valor mínimo">
<input id="f_max" placeholder="Valor máximo">
<input id="f_pulmao" placeholder="Qtd exata de pulmões">
<select id="f_ordemValor">
<option value="">Ordenar por valor</option>
<option value="asc">Menor → Maior</option>
<option value="desc">Maior → Menor</option>
</select>
</div>

<div class="actions">
<button onclick="toggleAll()">Selecionar todos</button>
<button onclick="clearSel()">Limpar seleção</button>
<button onclick="exportar()">Excel</button>
<button onclick="imprimir()">Imprimir auditoria</button>
</div>

<div class="table">
<table>
<thead>
<tr>
<th>✔</th>
<th>Código</th>
<th>Descrição</th>
<th>Local</th>
<th>Qtd</th>
<th>Valor</th>
</tr>
</thead>
<tbody id="tb"></tbody>
</table>
</div>

</div>

<script>

const file1 = document.getElementById('file1');
const file2 = document.getElementById('file2');
const file3 = document.getElementById('file3');

const f_codigo = document.getElementById('f_codigo');
const f_desc = document.getElementById('f_desc');
const f_local = document.getElementById('f_local');
const f_min = document.getElementById('f_min');
const f_max = document.getElementById('f_max');
const f_pulmao = document.getElementById('f_pulmao');
const f_ordemValor = document.getElementById('f_ordemValor');

const tb = document.getElementById('tb');
const k1 = document.getElementById('k1');
const k2 = document.getElementById('k2');
const k3 = document.getElementById('k3');
    
let base=[], view=[];
let apanhaMap={};
let pulmaoMap={};
let selected=new Set();

function parse(v){
return parseFloat(String(v||0).replace(/\./g,'').replace(',','.'))||0;
}

/* =========================
COMPARATIVO
========================= */
file1.onchange = async e=>{
document.getElementById('prog1')?.style.setProperty('width','30%');
document.getElementById('prog2')?.style.setProperty('width','30%');
document.getElementById('prog3')?.style.setProperty('width','30%');
const lines=(await e.target.files[0].text()).split(/\r?\n/);
document.getElementById('prog3')?.style.setProperty('width','100%');
document.getElementById('prog2')?.style.setProperty('width','100%');
document.getElementById('prog1')?.style.setProperty('width','100%');

base=[];

for(let i=1;i<lines.length;i++){
const c=lines[i].split(';');
if(c.length<10) continue;

base.push({
codigo:(c[0]||'').trim(),
desc:c[1],
local:c[2],
qtd:parse(c[6]),
valor:parse(c[9])
});
}

view = [...base];
aplicarFiltros();
kpi();
};

/* =========================
APANHA (ENDEREÇOS AGORA)
========================= */
file2.onchange = async e=>{
const lines=(await e.target.files[0].text()).split(/\r?\n/);

apanhaMap={};

for(let i=1;i<lines.length;i++){
const c=lines[i].split(';');

const seq=(c[1]||'').trim();

// endereço completo apanha (ajuste se quiser)
const ender=`${c[0]}-${c[1]}-${c[2]}-${c[3]}-${c[4]}`;

if(seq){
if(!apanhaMap[seq]) apanhaMap[seq]=[];
apanhaMap[seq].push(ender);
}
}

kpi();
aplicarFiltros();
};

/* =========================
PULMÃO (ENDEREÇOS)
========================= */
file3.onchange = async e=>{
const lines=(await e.target.files[0].text()).split(/\r?\n/);

pulmaoMap={};

for(let i=1;i<lines.length;i++){
const c=lines[i].split(';');

const seq=(c[5]||'').trim();
const ender=`${c[1]}-${c[2]}-${c[3]}-${c[4]}`;

if(seq){
if(!pulmaoMap[seq]) pulmaoMap[seq]=[];
pulmaoMap[seq].push(ender);
}
}

kpi();
aplicarFiltros();
};

/* =========================
RENDER
========================= */
function render(){

let html='';

for(let x of view){

html+=`
<tr>
<td>
<input
    type="checkbox"
    class="chk"
    ${selected.has(x.codigo) ? 'checked' : ''}
    onchange="sel('${x.codigo}',this.checked)">
</td>
<td>${x.codigo}</td>
<td>${x.desc}</td>
<td>${x.local}</td>
<td>${x.qtd}</td>
<td>${x.valor.toFixed(2)}</td>
</tr>`;
}

tb.innerHTML=html;
}
/* =========================
SELEÇÃO
========================= */
function sel(c,v){
v ? selected.add(c) : selected.delete(c);
}

function toggleAll(){
view.forEach(x=>selected.add(x.codigo));
render();
}

function clearSel(){
selected.clear();
render();
}

/* =========================
FILTRO
========================= */
function aplicarFiltros(){

    const cod = f_codigo.value.trim().toLowerCase();
    const desc = f_desc.value.trim().toLowerCase();
    const local = f_local.value.trim().toLowerCase();

    const min = parse(f_min.value);
    const max = parse(f_max.value);

    const qtdPulmao = f_pulmao.value.trim();

    view = base.filter(x => {

        const pu = (pulmaoMap[x.codigo] || []).length;

        return (
            (!cod || String(x.codigo || '').toLowerCase().includes(cod)) &&
            (!desc || String(x.desc || '').toLowerCase().includes(desc)) &&
            (!local || String(x.local || '').toLowerCase().includes(local)) &&
            (!f_min.value || x.valor >= min) &&
            (!f_max.value || x.valor <= max) &&
            (
                qtdPulmao === '' ||
                pu === Number(qtdPulmao)
            )
        );
    });

    if (f_ordemValor.value === 'asc') {
        view.sort((a, b) => a.valor - b.valor);
    }

    if (f_ordemValor.value === 'desc') {
        view.sort((a, b) => b.valor - a.valor);
    }

    render();
}

/* =========================
EXPORT
========================= */
function exportar(){

const data=view.map(x=>({
Codigo:x.codigo,
Descricao:x.desc,
Local:x.local,
Qtd:x.qtd,
Valor:x.valor,
Apanha:(apanhaMap[x.codigo]||[]).length,
Pulmoes:(pulmaoMap[x.codigo]||[]).length
}));

const ws=XLSX.utils.json_to_sheet(data);
const wb=XLSX.utils.book_new();
XLSX.utils.book_append_sheet(wb,ws,"CD107");
XLSX.writeFile(wb,"CD107.xlsx");
}


/* =========================
IMPRIMIR
========================= */
function imprimir(){

    const itensSelecionados = view.filter(x =>
        selected.has(x.codigo)
    );

    if(itensSelecionados.length === 0){
        alert('Selecione pelo menos um item para imprimir.');
        return;
    }

    let w = window.open('', '_blank');

    w.document.write(`
    <html>
    <head>
    <title>RELATÓRIO WMS CD-107</title>

    <style>
body{margin:0;font-family:'Segoe UI',sans-serif;background:linear-gradient(135deg,#0b1220,#111827);color:#e5e7eb}
header{padding:20px;background:#0f172a;position:sticky;top:0;font-size:28px;font-weight:700;border-bottom:1px solid #1f2937;box-shadow:0 2px 15px rgba(0,0,0,.3)}
.container{padding:20px;max-width:1600px;margin:auto}
.kpi{display:grid;grid-template-columns:repeat(auto-fit,minmax(250px,1fr));gap:15px;margin-top:20px}
.kpi div{background:#111827;padding:20px;border-radius:16px;border:1px solid #1f2937;font-size:24px;font-weight:600;transition:.3s}
.kpi div:hover{transform:translateY(-4px)}
.upload{margin-top:15px;background:#111827;padding:18px;border:1px solid #1f2937;border-radius:16px}
input,select{padding:12px;background:#0f172a;border:1px solid #374151;color:white;border-radius:10px;width:100%;box-sizing:border-box}
.filters{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:10px;margin-top:20px}
.actions{margin-top:20px;display:flex;gap:10px;flex-wrap:wrap}
button{background:#2563eb;border:none;color:white;padding:12px 18px;border-radius:10px;cursor:pointer}
button:hover{background:#1d4ed8}
.table{margin-top:20px;border-radius:16px;overflow:auto;max-height:600px;background:#111827}
table{width:100%;border-collapse:collapse}
th{position:sticky;top:0;background:#1e293b;padding:14px}
td{padding:12px;border-bottom:1px solid #1f2937}
tr:hover{background:#1e293b}
.chk{transform:scale(1.2)}
.progress{width:100%;height:8px;background:#1f2937;border-radius:20px;margin-top:12px;overflow:hidden}
.progress-bar{width:0%;height:100%;background:linear-gradient(90deg,#3b82f6,#60a5fa);transition:width .4s ease}
</style>

    </head>
    <body>
    `);

    for(let i = 0; i < itensSelecionados.length; i += 8){

        w.document.write(`<div class="pagina">`);

        const grupo = itensSelecionados.slice(i, i + 8);

        grupo.forEach(x=>{

            const ap = (apanhaMap[x.codigo] || [])
                .map(a => a.split('-')[0]);

            const pu = pulmaoMap[x.codigo] || [];

            w.document.write(`
                <div class="card">

                    <div class="titulo">
                        ${x.codigo} - ${x.desc}
                    </div>

                    <div class="linha">
                        <span class="rotulo">Local:</span>
                        ${x.local}
                    </div>

                    <div class="linha">
                        <span class="rotulo">Quantidade:</span>
                        ${x.qtd}
                    </div>

                    <div class="linha">
                        <span class="rotulo">Valor:</span>
                        ${x.valor.toFixed(2)}
                    </div>

                    <div class="secao">
                        <span class="rotulo">Apanha:</span><br>
                        ${ap.length
                            ? ap.join(' - ')
                            : 'SEM APANHA'}
                    </div>

                    <div class="secao">
                        <span class="rotulo">Pulmões:</span><br>
                        ${pu.length
                            ? pu.join(' - ')
                            : 'SEM PULMÃO'}
                    </div>

                </div>
            `);

        });

        /* Completa espaços vazios */
        for(let j = grupo.length; j < 8; j++){
            w.document.write(`<div class="card vazio"></div>`);
        }

        w.document.write(`</div>`);
    }

    w.document.write(`
    </body>
    </html>
    `);

    w.document.close();

    setTimeout(()=>{
        w.focus();
        w.print();
    },500);

}
/* =========================
KPI
========================= */
function kpi(){

k1.innerText=base.length;

let a=0,p=0;
for(let k in apanhaMap)a+=(apanhaMap[k]||[]).length;
for(let k in pulmaoMap)p+=(pulmaoMap[k]||[]).length;

k2.innerText=a;
k3.innerText=p;
}
f_codigo.addEventListener('input', aplicarFiltros);
f_desc.addEventListener('input', aplicarFiltros);
f_local.addEventListener('input', aplicarFiltros);
f_min.addEventListener('input', aplicarFiltros);
f_max.addEventListener('input', aplicarFiltros);
f_pulmao.addEventListener('input', aplicarFiltros);
f_ordemValor.addEventListener('change', aplicarFiltros);
    
</script>

</body>
</html>
