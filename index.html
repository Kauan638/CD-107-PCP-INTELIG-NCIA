<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CD-107 PCP Inteligência</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Segoe UI',sans-serif;
}

body{
background:#0f172a;
color:white;
}

header{
background:#111827;
padding:20px;
border-bottom:1px solid #1f2937;
}

.container{
padding:20px;
}

.upload{
background:#1e293b;
padding:20px;
border-radius:15px;
margin-bottom:20px;
}

.cards{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:15px;
margin-bottom:20px;
}

.card{
background:#1e293b;
padding:20px;
border-radius:15px;
}

.card h3{
color:#94a3b8;
font-size:14px;
}

.valor{
font-size:24px;
font-weight:bold;
margin-top:10px;
}

.graficos{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:20px;
margin-top:20px;
}

.box{
background:#1e293b;
padding:20px;
border-radius:15px;
}

table{
width:100%;
border-collapse:collapse;
}

th{
background:#111827;
padding:10px;
}

td{
padding:8px;
border-bottom:1px solid #334155;
font-size:13px;
}

input{
width:100%;
padding:10px;
margin-top:15px;
border-radius:8px;
border:none;
}

button{
background:#2563eb;
color:white;
border:none;
padding:10px 15px;
border-radius:8px;
cursor:pointer;
margin-top:10px;
}

.critico{color:#ef4444;font-weight:bold;}
.alto{color:#f59e0b;font-weight:bold;}

@media(max-width:1200px){
.graficos{grid-template-columns:1fr;}
}
</style>
</head>

<body>

<header>
<h1>📊 CD-107 PCP INTELIGÊNCIA</h1>
</header>

<div class="container">

<div class="upload">
<h2>Importar Comparativo de Estoque</h2>
<input type="file" id="arquivo" accept=".txt">
</div>

<div class="cards">

<div class="card"><h3>Total Divergência</h3><div class="valor" id="total"></div></div>
<div class="card"><h3>Positivo</h3><div class="valor" id="positivo"></div></div>
<div class="card"><h3>Negativo</h3><div class="valor" id="negativo"></div></div>
<div class="card"><h3>Itens</h3><div class="valor" id="itens"></div></div>
<div class="card"><h3>Críticos</h3><div class="valor" id="criticos"></div></div>
<div class="card"><h3>Locais</h3><div class="valor" id="locais"></div></div>

</div>

<input type="text" id="pesquisa" placeholder="Pesquisar...">

<div class="box">
<table>
<thead>
<tr>
<th>Código</th>
<th>Descrição</th>
<th>Local</th>
<th>Qtd Divergente</th>
<th>Valor Divergente</th>
<th>Status</th>
</tr>
</thead>
<tbody id="tbody"></tbody>
</table>
</div>

<div class="graficos">
<div class="box"><canvas id="g1"></canvas></div>
<div class="box"><canvas id="g2"></canvas></div>
<div class="box"><canvas id="g3"></canvas></div>
</div>

</div>
<script>

let dados = [];
let g1,g2,g3;

function parseBR(v){
return parseFloat(String(v)
.replace(/\./g,'')
.replace(',', '.')) || 0;
}

document.getElementById('arquivo')
.addEventListener('change', e => {

const file = e.target.files[0];
if(!file) return;

const reader = new FileReader();

reader.onload = function(ev){
processar(ev.target.result);
};

reader.readAsText(file,'latin1');

});

function processar(txt){

const linhas = txt.split(/\r?\n/);

dados = [];

let total=0, pos=0, neg=0, crit=0;
const locais = new Set();

for(let i=1;i<linhas.length;i++){

const c = linhas[i].split(';');
if(c.length < 10) continue;

const codigo = c[0];
const desc = c[1];
const local = c[2];

const qtd = parseBR(c[6]);
const valor = parseBR(c[9]);

locais.add(local);

total += valor;
if(valor>0) pos+=valor;
if(valor<0) neg+=valor;

let status = "Baixo";
if(Math.abs(valor)>20000){status="Crítico"; crit++;}
else if(Math.abs(valor)>10000){status="Alto";}

dados.push({codigo,desc,local,qtd,valor,status});
}

document.getElementById('total').innerText =
total.toLocaleString('pt-BR',{style:'currency',currency:'BRL'});

document.getElementById('positivo').innerText =
pos.toLocaleString('pt-BR',{style:'currency',currency:'BRL'});

document.getElementById('negativo').innerText =
neg.toLocaleString('pt-BR',{style:'currency',currency:'BRL'});

document.getElementById('itens').innerText = dados.length;
document.getElementById('criticos').innerText = crit;
document.getElementById('locais').innerText = locais.size;

renderTabela(dados);
renderGraficos(dados);
}

function renderTabela(arr){

const tb = document.getElementById('tbody');
tb.innerHTML='';

arr.sort((a,b)=>Math.abs(b.valor)-Math.abs(a.valor))
.forEach(d=>{

tb.innerHTML += `
<tr>
<td>${d.codigo}</td>
<td>${d.desc}</td>
<td>${d.local}</td>
<td>${d.qtd}</td>
<td>${d.valor.toLocaleString('pt-BR',{style:'currency',currency:'BRL'})}</td>
<td class="${d.status=='Crítico'?'critico':d.status=='Alto'?'alto':''}">
${d.status}
</td>
</tr>`;
});
}

function renderGraficos(arr){

const top = [...arr].sort((a,b)=>Math.abs(b.valor)-Math.abs(a.valor)).slice(0,10);

if(g1) g1.destroy();
if(g2) g2.destroy();
if(g3) g3.destroy();

g1 = new Chart(document.getElementById('g1'),{
type:'bar',
data:{
labels:top.map(x=>x.desc.substring(0,20)),
datasets:[{label:'Valor',data:top.map(x=>x.valor)}]
}
});

g2 = new Chart(document.getElementById('g2'),{
type:'bar',
data:{
labels:top.map(x=>x.desc.substring(0,20)),
datasets:[{label:'Qtd',data:top.map(x=>x.qtd)}]
}
});

const map = {};
arr.forEach(x=>{
map[x.local]=(map[x.local]||0)+Math.abs(x.valor);
});

const loc = Object.entries(map).sort((a,b)=>b[1]-a[1]).slice(0,10);

g3 = new Chart(document.getElementById('g3'),{
type:'bar',
data:{
labels:loc.map(x=>x[0]),
datasets:[{label:'Local',data:loc.map(x=>x[1])}]
}
});
}

document.getElementById('pesquisa')
.addEventListener('input',function(){
const v=this.value.toLowerCase();

document.querySelectorAll('tbody tr').forEach(tr=>{
tr.style.display = tr.innerText.toLowerCase().includes(v)?'':'none';
});
});

</script>

</body>
</html>
