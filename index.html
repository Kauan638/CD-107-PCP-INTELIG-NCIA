<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CD-107 WMS Auditoria</title>

<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>

<style>

body{
margin:0;
font-family:Segoe UI;
background:#0f172a;
color:white;
display:flex;
}

/* SIDEBAR */
.sidebar{
width:260px;
background:#111827;
padding:15px;
height:100vh;
overflow:auto;
}

.sidebar h2{
font-size:14px;
color:#94a3b8;
margin-top:15px;
}

.btn{
width:100%;
padding:10px;
margin:5px 0;
background:#1e293b;
border:none;
color:white;
cursor:pointer;
border-radius:8px;
text-align:left;
}

.btn:hover{background:#2563eb}

/* MAIN */
.main{
flex:1;
padding:20px;
}

table{
width:100%;
border-collapse:collapse;
margin-top:10px;
font-size:13px;
}

th,td{
padding:8px;
border-bottom:1px solid #334155;
}

tr:hover{background:#1e293b}

/* MODAL */
.modal{
position:fixed;
top:0;left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.7);
display:none;
align-items:center;
justify-content:center;
}

.modal-content{
background:#111827;
padding:20px;
width:70%;
border-radius:10px;
max-height:90vh;
overflow:auto;
}

.section{
background:#1e293b;
padding:10px;
margin-bottom:10px;
border-radius:8px;
}

/* FILTERS */
.filters{
display:flex;
gap:8px;
flex-wrap:wrap;
margin-top:10px;
}

.filters input{
padding:6px;
border-radius:6px;
border:none;
outline:none;
}

/* PRINT */
@media print{
.sidebar,button,input{display:none !important;}
.main{width:100%}
}

</style>
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">

<h2>📥 Uploads</h2>

<input type="file" id="file1">
<input type="file" id="file2">
<input type="file" id="file3">

<button class="btn" onclick="exportarExcel()">📤 Exportar Excel</button>
<button class="btn" onclick="imprimirRelatorio()">🖨️ Imprimir Relatório</button>

<h2>📊 Status</h2>
<div id="status"></div>

</div>

<!-- MAIN -->
<div class="main">

<h1>CD-107 WMS Auditoria</h1>

<!-- FILTROS -->
<div class="filters">
<input id="f_codigo" placeholder="Código" oninput="filtrarTabela()">
<input id="f_desc" placeholder="Descrição" oninput="filtrarTabela()">
<input id="f_local" placeholder="Local" oninput="filtrarTabela()">
<input id="f_qtd" placeholder="Qtd mínima" oninput="filtrarTabela()">
<input id="f_valor" placeholder="Valor mínimo" oninput="filtrarTabela()">
</div>

<table>
<thead>
<tr>
<th><input type="checkbox" onclick="toggleAll(this)"></th>
<th>Código</th>
<th>Descrição</th>
<th>Local</th>
<th>Qtd</th>
<th>Valor</th>
</tr>
</thead>
<tbody id="tb"></tbody>
</table>

</div>

<!-- MODAL -->
<div class="modal" id="modal" onclick="this.style.display='none'">
<div class="modal-content" onclick="event.stopPropagation()">

<h2 id="title"></h2>

<div class="section">
<h3>📍 Apanha</h3>
<div id="apanha"></div>
</div>

<div class="section">
<h3>🏭 Pulmão</h3>
<div id="pulmao"></div>
</div>

<div class="section">
<h3>📊 Divergência</h3>
<div id="div"></div>
</div>

</div>
</div>

<script>

let comparativo = [];
let apanha = {};
let pulmao = [];

/* ================= UTIL ================= */
function parseBR(v){
return parseFloat(String(v).replace(/\./g,'').replace(',','.')) || 0;
}

/* ================= FILE 1 ================= */
document.getElementById('file1').onchange = e=>{
const f = e.target.files[0];
const r = new FileReader();

r.onload = ev=>{
const lines = ev.target.result.split(/\r?\n/);
comparativo = [];

for(let i=1;i<lines.length;i++){
const c = lines[i].split(';');
if(c.length<10) continue;

comparativo.push({
codigo:c[0],
desc:c[1],
local:c[2],
qtd:parseBR(c[6]),
valor:parseBR(c[9])
});
}

renderTableCustom(comparativo);
updateStatus();
};

r.readAsText(f,'latin1');
};

/* ================= FILE 2 APANHA ================= */
document.getElementById('file2').onchange = e=>{
const f = e.target.files[0];
const r = new FileReader();

r.onload = ev=>{
const lines = ev.target.result.split(/\r?\n/);
apanha = {};

for(let i=1;i<lines.length;i++){
const c = lines[i].split(';');
if(c.length<3) continue;

const end = c[0];
const cod = c[5];

if(!apanha[cod]) apanha[cod]=[];
apanha[cod].push(end);
}
};

r.readAsText(f,'latin1');
};

/* ================= FILE 3 PULMÃO ================= */
document.getElementById('file3').onchange = e=>{
const f = e.target.files[0];
const r = new FileReader();

r.onload = ev=>{
const lines = ev.target.result.split(/\r?\n/);
pulmao = {};

for(let i=1;i<lines.length;i++){
const c = lines[i].split(';');
if(c.length<7) continue;

const cod = c[5];

if(!pulmao[cod]) pulmao[cod]=[];

pulmao[cod].push({
endereco:`${c[1]}-${c[2]}-${c[3]}-${c[4]}`,
status:c[8]
});
}
};

r.readAsText(f,'latin1');
};

/* ================= TABELA ================= */
function renderTableCustom(list){

const tb = document.getElementById('tb');
tb.innerHTML='';

list.forEach(x=>{

const tr = document.createElement('tr');

/* FIX CHECKBOX CLICK */
tr.addEventListener('click',(e)=>{
if(e.target.type==='checkbox') return;
openProduct(x.codigo);
});

tr.innerHTML=`
<td><input type="checkbox" class="chk" value="${x.codigo}"></td>
<td>${x.codigo}</td>
<td>${x.desc}</td>
<td>${x.local}</td>
<td>${x.qtd}</td>
<td>${x.valor.toLocaleString('pt-BR',{style:'currency',currency:'BRL'})}</td>
`;

tb.appendChild(tr);
});
}

/* ================= MODAL ================= */
function openProduct(cod){

const c = comparativo.find(x=>x.codigo==cod);

document.getElementById('modal').style.display='flex';

document.getElementById('title').innerText =
`Produto ${cod} - ${c?.desc||''}`;

document.getElementById('apanha').innerHTML =
(apanha[cod]||[]).join('<br>') || 'Sem apanha';

document.getElementById('pulmao').innerHTML =
(pulmao[cod]||[]).map(x=>`${x.endereco} (${x.status})`).join('<br>') || 'Sem pulmão';

document.getElementById('div').innerHTML = `
Qtd: ${c?.qtd||0}<br>
Valor: ${(c?.valor||0).toLocaleString('pt-BR',{style:'currency',currency:'BRL'})}
`;
}

/* ================= FILTRO ================= */
function filtrarTabela(){

const c = f_codigo.value.toLowerCase();
const d = f_desc.value.toLowerCase();
const l = f_local.value.toLowerCase();
const q = parseFloat(f_qtd.value)||null;
const v = parseFloat(f_valor.value)||null;

const f = comparativo.filter(x=>
(!c || x.codigo.includes(c)) &&
(!d || x.desc.toLowerCase().includes(d)) &&
(!l || x.local.toLowerCase().includes(l)) &&
(!q || x.qtd>=q) &&
(!v || x.valor>=v)
);

renderTableCustom(f);
}

/* ================= SELECT ALL ================= */
function toggleAll(el){
document.querySelectorAll('.chk').forEach(x=>x.checked=el.checked);
}

/* ================= EXCEL ================= */
function exportarExcel(){

const sel = [...document.querySelectorAll('.chk:checked')].map(x=>x.value);

if(!sel.length) return alert("Selecione itens");

const data = sel.map(cod=>{
const c = comparativo.find(x=>x.codigo==cod);

return{
Codigo:cod,
Descricao:c?.desc,
Local:c?.local,
Qtd:c?.qtd,
Valor:c?.valor,
Apanha:(apanha[cod]||[]).join(' | '),
Pulmao:(pulmao[cod]||[]).map(x=>x.endereco).join(' | ')
};
});

const ws = XLSX.utils.json_to_sheet(data);
const wb = XLSX.utils.book_new();
XLSX.utils.book_append_sheet(wb,ws,"Auditoria");

XLSX.writeFile(wb,"auditoria.xlsx");
}

/* ================= PRINT ================= */
function imprimirRelatorio(){

const sel = [...document.querySelectorAll('.chk:checked')].map(x=>x.value);

if(!sel.length) return alert("Selecione itens");

let html = `<h1>RELATÓRIO WMS AUDITORIA</h1><hr>`;

sel.forEach(cod=>{
const c = comparativo.find(x=>x.codigo==cod);

html+=`
<div style="border:1px solid #ccc;padding:10px;margin:10px 0">
<h3>${cod} - ${c?.desc}</h3>
<p><b>Local:</b> ${c?.local}</p>
<p><b>Qtd:</b> ${c?.qtd}</p>
<p><b>Valor:</b> ${c?.valor}</p>
<p><b>Apanha:</b> ${(apanha[cod]||[]).join(', ')}</p>
<p><b>Pulmão:</b> ${(pulmao[cod]||[]).map(x=>x.endereco).join(', ')}</p>
</div>`;
});

const w = window.open();
w.document.write(html);
w.print();
}

/* ================= STATUS ================= */
function updateStatus(){
document.getElementById('status').innerHTML=`
Produtos: ${comparativo.length}<br>
Apanha: ${Object.keys(apanha).length}<br>
Pulmão: ${Object.keys(pulmao).length}
`;
}

</script>

</body>
</html>
