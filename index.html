<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CD-107 WMS INTELIGÊNCIA</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

body{
margin:0;
font-family:Segoe UI;
background:#0f172a;
color:white;
display:flex;
}

/* SIDEBAR */
.sidebar{
width:260px;
background:#111827;
padding:15px;
height:100vh;
position:sticky;
top:0;
}

.sidebar h2{
font-size:14px;
color:#94a3b8;
margin-top:20px;
}

.btn{
width:100%;
padding:10px;
margin:5px 0;
background:#1e293b;
border:none;
color:white;
cursor:pointer;
border-radius:8px;
text-align:left;
}

.btn:hover{
background:#2563eb;
}

/* CONTEUDO */
.main{
flex:1;
padding:20px;
}

.cards{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:10px;
}

.card{
background:#1e293b;
padding:15px;
border-radius:10px;
}

.valor{
font-size:20px;
font-weight:bold;
}

/* TABELA */
table{
width:100%;
margin-top:15px;
border-collapse:collapse;
}

th,td{
padding:8px;
border-bottom:1px solid #334155;
font-size:13px;
}

tr:hover{
background:#1e293b;
cursor:pointer;
}

/* MODAL */
.modal{
position:fixed;
top:0;left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.7);
display:none;
align-items:center;
justify-content:center;
}

.modal-content{
background:#111827;
padding:20px;
width:70%;
border-radius:10px;
max-height:90vh;
overflow:auto;
}

.section{
margin-bottom:15px;
padding:10px;
background:#1e293b;
border-radius:8px;
}

</style>
</head>
<body>
  <script>

let comparativo = [];
let apanha = [];
let pulmao = [];

let dados = [];

let selected = null;

document.addEventListener('DOMContentLoaded', ()=>{

document.getElementById('file1').onchange = e=>loadComparativo(e);
document.getElementById('file2').onchange = e=>loadApanha(e);
document.getElementById('file3').onchange = e=>loadPulmao(e);

});

function parseBR(v){
return parseFloat(String(v).replace(/\./g,'').replace(',','.')) || 0;
}

/* =========================
   1. COMPARATIVO
========================= */
function loadComparativo(e){
const file = e.target.files[0];
const r = new FileReader();

r.onload = ev=>{
const lines = ev.target.result.split(/\r?\n/);

comparativo = [];

for(let i=1;i<lines.length;i++){
const c = lines[i].split(';');
if(c.length < 10) continue;

comparativo.push({
codigo:c[0],
desc:c[1],
local:c[2],
qtd:parseBR(c[6]),
valor:parseBR(c[9])
});
}

buildTable();
};

r.readAsText(file,'latin1');
}

/* =========================
   2. APANHA
========================= */
function loadApanha(e){
const file = e.target.files[0];
const r = new FileReader();

r.onload = ev=>{
const lines = ev.target.result.split(/\r?\n/);

apanha = {};

for(let i=1;i<lines.length;i++){
const c = lines[i].split(';');
if(c.length < 3) continue;

const cod = c[1];
const end = c[0];

if(!apanha[cod]) apanha[cod]=[];
apanha[cod].push(end);
}
};

r.readAsText(file,'latin1');
}

/* =========================
   3. PULMÃO
========================= */
function loadPulmao(e){
const file = e.target.files[0];
const r = new FileReader();

r.onload = ev=>{
const lines = ev.target.result.split(/\r?\n/);

pulmao = {};

for(let i=1;i<lines.length;i++){
const c = lines[i].split(';');
if(c.length < 7) continue;

const cod = c[5];

if(!pulmao[cod]) pulmao[cod]=[];

pulmao[cod].push({
endereco:`${c[1]}-${c[2]}-${c[3]}-${c[4]}`,
status:c[8]
});
}
};

r.readAsText(file,'latin1');
}

/* =========================
   TABELA PRINCIPAL
========================= */
function buildTable(){

const tb = document.getElementById('tb');
tb.innerHTML='';

comparativo.forEach(x=>{

const tr = document.createElement('tr');

tr.onclick=()=>openProduct(x.codigo);

tr.innerHTML=`
<td>${x.codigo}</td>
<td>${x.desc}</td>
<td>${x.local}</td>
<td>${x.qtd}</td>
<td>${x.valor.toLocaleString('pt-BR',{style:'currency',currency:'BRL'})}</td>
`;

tb.appendChild(tr);
});
}

/* =========================
   PAINEL PRODUTO
========================= */
function openProduct(cod){

selected = cod;

document.getElementById('modal').style.display='flex';

const comp = comparativo.find(x=>x.codigo==cod);

document.getElementById('title').innerText =
`Produto ${cod} - ${comp?.desc || ''}`;

/* APANHA */
document.getElementById('apanha').innerHTML =
(apanha[cod] || []).map(x=>`<div>${x}</div>`).join('') || 'Sem apanha';

/* PULMAO */
document.getElementById('pulmao').innerHTML =
(pulmao[cod] || []).map(x=>`
<div>${x.endereco} (${x.status})</div>
`).join('') || 'Sem pulmão';

/* DIVERGENCIA */
document.getElementById('div').innerHTML = `
Qtd: ${comp?.qtd || 0}<br>
Valor: ${(comp?.valor || 0).toLocaleString('pt-BR',{style:'currency',currency:'BRL'})}
`;
}

function closeModal(){
document.getElementById('modal').style.display='none';
}

</script>

<!-- FILE INPUTS -->
<div class="sidebar">
<h2>Uploads</h2>
<input type="file" id="file1">
<input type="file" id="file2">
<input type="file" id="file3">

<h2>Produtos</h2>
<div id="list"></div>
</div>

<!-- MAIN -->
<div class="main">
<h1>Dashboard WMS Inteligência</h1>

<table>
<thead>
<tr>
<th>Código</th>
<th>Descrição</th>
<th>Local</th>
<th>Qtd</th>
<th>Valor</th>
</tr>
</thead>
<tbody id="tb"></tbody>
</table>
</div>

<!-- MODAL -->
<div class="modal" id="modal" onclick="closeModal()">
<div class="modal-content" onclick="event.stopPropagation()">

<h2 id="title"></h2>

<div class="section">
<h3>Apanha</h3>
<div id="apanha"></div>
</div>

<div class="section">
<h3>Pulmão</h3>
<div id="pulmao"></div>
</div>

<div class="section">
<h3>Divergência</h3>
<div id="div"></div>
</div>

</div>
</div>

</body>
</html>
