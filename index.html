<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CD-107 WMS Intelligence FINAL</title>

<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>

<style>

body{
margin:0;
font-family:Segoe UI;
background:#0b1220;
color:#e5e7eb;
}

header{
padding:14px;
background:#111827;
position:sticky;
top:0;
border-bottom:1px solid #1f2937;
}

.container{
padding:14px;
max-width:1400px;
margin:auto;
}

/* KPI */
.kpi{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(160px,1fr));
gap:10px;
margin-top:10px;
}

.kpi div{
background:#111827;
padding:12px;
border-radius:10px;
border-left:3px solid #2563eb;
}

/* UPLOAD */
.upload-grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(240px,1fr));
gap:12px;
margin-top:12px;
}

.upload-card{
background:#0f172a;
border:1px solid #1f2937;
padding:14px;
border-radius:12px;
}

.upload-btn{
display:inline-block;
padding:10px;
background:#2563eb;
color:white;
border-radius:8px;
cursor:pointer;
text-align:center;
font-size:13px;
}

input[type=file]{display:none}

.bar{
height:6px;
background:#1f2937;
border-radius:999px;
margin-top:8px;
overflow:hidden;
}

.bar-fill{
height:100%;
width:0%;
background:linear-gradient(90deg,#2563eb,#22c55e);
transition:.2s;
}

.status{
font-size:11px;
color:#9ca3af;
margin-top:5px;
}

/* FILTERS */
.filters{
margin-top:14px;
display:grid;
grid-template-columns:repeat(auto-fit,minmax(160px,1fr));
gap:8px;
}

.filters input{
padding:10px;
background:#111827;
border:1px solid #1f2937;
border-radius:8px;
color:white;
}

/* BUTTONS */
.actions{
margin-top:10px;
display:flex;
gap:8px;
flex-wrap:wrap;
}

button{
padding:10px 12px;
background:#111827;
border:1px solid #1f2937;
color:white;
border-radius:8px;
cursor:pointer;
}

button:hover{
border-color:#2563eb;
}

/* TABLE */
.table{
margin-top:12px;
overflow:auto;
border-radius:10px;
border:1px solid #1f2937;
}

table{
width:100%;
border-collapse:collapse;
min-width:900px;
font-size:12px;
}

th{
background:#111827;
position:sticky;
top:0;
padding:10px;
}

td{
padding:8px;
border-bottom:1px solid #1f2937;
}

</style>
</head>

<body>

<header>📊 CD-107 WMS INTELLIGENCE FINAL</header>

<div class="container">

<!-- KPI -->
<div class="kpi">
<div>📦 Itens: <b id="k1">0</b></div>
<div>📍 Apanhas: <b id="k2">0</b></div>
<div>🏭 Pulmões: <b id="k3">0</b></div>
</div>

<!-- UPLOAD -->
<div class="upload-grid">

<div class="upload-card">
<label class="upload-btn">📁 Comparativo
<input id="file1" type="file">
</label>
<div class="bar"><div id="b1" class="bar-fill"></div></div>
<div class="status" id="s1">Aguardando...</div>
</div>

<div class="upload-card">
<label class="upload-btn">📍 Apanha
<input id="file2" type="file">
</label>
<div class="bar"><div id="b2" class="bar-fill"></div></div>
<div class="status" id="s2">Aguardando...</div>
</div>

<div class="upload-card">
<label class="upload-btn">🏭 Pulmão
<input id="file3" type="file">
</label>
<div class="bar"><div id="b3" class="bar-fill"></div></div>
<div class="status" id="s3">Aguardando...</div>
</div>

</div>

<!-- FILTERS -->
<div class="filters">
<input id="f1" placeholder="Código">
<input id="f2" placeholder="Descrição">
<input id="f3" placeholder="Local">
<input id="f4" placeholder="Valor mínimo">
</div>

<div class="actions">
<button onclick="ordenar('maior')">⬆ Maior valor</button>
<button onclick="ordenar('menor')">⬇ Menor valor</button>
<button onclick="exportar()">📊 Excel</button>
<button onclick="imprimir()">🖨 Imprimir</button>
</div>

<div class="table">
<table>
<thead>
<tr>
<th>Código</th>
<th>Descrição</th>
<th>Local</th>
<th>Qtd</th>
<th>Valor</th>
<th>Apanha</th>
<th>Pulmão</th>
</tr>
</thead>
<tbody id="tb"></tbody>
</table>
</div>

</div>

<script>

let base=[],view=[];
let apanha={},pulmao={};

function norm(v){
return String(v||'').trim().replace(/\s/g,'');
}

/* =========================
PROGRESS (REAL FIX)
========================= */
function prog(idBar,idStatus,text,p){
document.getElementById(idBar).style.width=p+'%';
document.getElementById(idStatus).innerText=text;
}

/* =========================
COMPARATIVO (100% FIX)
========================= */
document.getElementById('file1').addEventListener('change',function(e){

const file=e.target.files[0];
const reader=new FileReader();

prog('b1','s1','Lendo arquivo...',10);

reader.onload=function(ev){

const lines=ev.target.result.split(/\r?\n/);

base=[];
let i=1;

function loop(){

const chunkSize=1500;
const end=Math.min(i+chunkSize,lines.length);

for(;i<end;i++){

const c=lines[i].split(';');
if(c.length<8)continue;

base.push({
codigo:norm(c[0]),
desc:c[1],
local:c[2],
qtd:+(c[6]||0),
valor:Math.abs(+(c[9]||0))
});
}

/* PROGRESS REAL */
const pct=Math.round((i/lines.length)*100);
prog('b1','s1','Processando '+pct+'%',pct);

if(i<lines.length){
requestAnimationFrame(loop);
}else{
view=[...base];
render();
kpi();
prog('b1','s1','Concluído ✔',100);
}
}

loop();
};

reader.readAsText(file,'latin1');
});

/* =========================
APANHA
========================= */
document.getElementById('file2').addEventListener('change',function(e){

const r=new FileReader();

r.onload=ev=>{
const l=ev.target.result.split(/\r?\n/);
apanha={};

for(let i=1;i<l.length;i++){
const c=l[i].split(';');
if(c.length<6)continue;

const cod=norm(c[5]);
if(!cod)continue;

apanha[cod]=apanha[cod]||[];
apanha[cod].push(c[0]);
}

prog('b2','s2','OK ✔',100);
kpi();
};

r.readAsText(e.target.files[0],'latin1');
});

/* =========================
PULMÃO
========================= */
document.getElementById('file3').addEventListener('change',function(e){

const r=new FileReader();

r.onload=ev=>{
const l=ev.target.result.split(/\r?\n/);
pulmao={};

for(let i=1;i<l.length;i++){
const c=l[i].split(';');
if(c.length<6)continue;

const cod=norm(c[5]);
if(!cod)continue;

pulmao[cod]=pulmao[cod]||[];
pulmao[cod].push(c[0]);
}

prog('b3','s3','OK ✔',100);
kpi();
};

r.readAsText(e.target.files[0],'latin1');
});

/* =========================
RENDER
========================= */
function render(){

const tb=document.getElementById('tb');
tb.innerHTML='';

view.forEach(x=>{
tb.innerHTML+=`
<tr>
<td>${x.codigo}</td>
<td>${x.desc}</td>
<td>${x.local}</td>
<td>${x.qtd}</td>
<td>${x.valor.toFixed(2)}</td>
<td>${apanha[x.codigo]?.length||'SEM'}</td>
<td>${pulmao[x.codigo]?.length||'SEM'}</td>
</tr>`;
});
}

/* =========================
KPI
========================= */
function kpi(){
document.getElementById('k1').innerText=base.length;

let a=0,p=0;
for(let k in apanha)a+=apanha[k].length;
for(let k in pulmao)p+=pulmao[k].length;

document.getElementById('k2').innerText=a;
document.getElementById('k3').innerText=p;
}

/* =========================
UTILS
========================= */
function ordenar(t){
if(t==='maior')view.sort((a,b)=>b.valor-a.valor);
if(t==='menor')view.sort((a,b)=>a.valor-b.valor);
render();
}

function exportar(){

const data=view.map(x=>({
Codigo:x.codigo,
Desc:x.desc,
Local:x.local,
Qtd:x.qtd,
Valor:x.valor,
Apanha:apanha[x.codigo]?.length||0,
Pulmao:pulmao[x.codigo]?.length||0
}));

const ws=XLSX.utils.json_to_sheet(data);
const wb=XLSX.utils.book_new();
XLSX.utils.book_append_sheet(wb,ws,'CD107');
XLSX.writeFile(wb,'CD107.xlsx');
}

function imprimir(){
window.print();
}

</script>

</body>
</html>
