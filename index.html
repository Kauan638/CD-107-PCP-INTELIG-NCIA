<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CD-107 | WMS Intelligence</title>

<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>

<style>

/* =====================
BASE
===================== */
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Inter,Segoe UI,Arial;
}

body{
background:#0b1220;
color:#e5e7eb;
}

/* =====================
HEADER
===================== */
header{
position:sticky;
top:0;
z-index:10;
background:rgba(17,24,39,.95);
backdrop-filter:blur(10px);
padding:16px 20px;
border-bottom:1px solid #1f2937;
}

header h1{
font-size:18px;
letter-spacing:.5px;
}

/* =====================
CONTAINER
===================== */
.container{
padding:18px;
max-width:1400px;
margin:auto;
}

/* =====================
CARDS KPI
===================== */
.kpi{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
gap:12px;
margin-top:12px;
}

.kpi-card{
background:#111827;
border:1px solid #1f2937;
padding:14px;
border-radius:12px;
border-left:3px solid #2563eb;
}

.kpi-card b{
font-size:18px;
display:block;
margin-top:6px;
}

/* =====================
UPLOAD MODERNO
===================== */
.upload-grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
gap:14px;
margin-top:14px;
}

.upload-card{
background:#0f172a;
border:1px solid #1f2937;
padding:16px;
border-radius:14px;
transition:.2s;
cursor:pointer;
position:relative;
overflow:hidden;
}

.upload-card:hover{
border-color:#2563eb;
transform:translateY(-2px);
}

.upload-title{
font-size:13px;
color:#94a3b8;
margin-bottom:10px;
}

.upload-btn{
display:inline-block;
padding:10px 12px;
background:#2563eb;
color:white;
border-radius:10px;
font-size:13px;
cursor:pointer;
text-align:center;
transition:.2s;
}

.upload-btn:hover{
background:#1d4ed8;
}

input[type=file]{
display:none;
}

.bar{
height:6px;
background:#1f2937;
border-radius:999px;
margin-top:10px;
overflow:hidden;
}

.bar-fill{
height:100%;
width:0%;
background:linear-gradient(90deg,#2563eb,#22c55e);
transition:.3s;
}

.status{
font-size:11px;
color:#9ca3af;
margin-top:6px;
}

/* =====================
FILTROS
===================== */
.filters{
margin-top:16px;
display:grid;
grid-template-columns:repeat(auto-fit,minmax(160px,1fr));
gap:10px;
}

.filters input{
padding:10px;
background:#111827;
border:1px solid #1f2937;
border-radius:10px;
color:white;
outline:none;
}

/* =====================
BOTÕES
===================== */
.actions{
margin-top:12px;
display:flex;
flex-wrap:wrap;
gap:8px;
}

.btn{
padding:10px 14px;
border-radius:10px;
border:1px solid #1f2937;
background:#111827;
color:#e5e7eb;
cursor:pointer;
transition:.2s;
font-size:13px;
}

.btn:hover{
background:#1f2937;
border-color:#2563eb;
}

/* =====================
TABELA
===================== */
.table{
margin-top:14px;
overflow:auto;
border-radius:12px;
border:1px solid #1f2937;
}

table{
width:100%;
border-collapse:collapse;
font-size:12px;
min-width:900px;
}

th{
position:sticky;
top:0;
background:#111827;
padding:10px;
text-align:left;
}

td{
padding:8px;
border-bottom:1px solid #1f2937;
}

tr:hover{
background:#0f172a;
}

</style>
</head>

<body>

<header>
<h1>📊 CD-107 WMS Intelligence Dashboard</h1>
</header>

<div class="container">

<!-- KPI -->
<div class="kpi">
<div class="kpi-card">📦 Itens<b id="k1">0</b></div>
<div class="kpi-card">📍 Apanhas<b id="k2">0</b></div>
<div class="kpi-card">🏭 Pulmões<b id="k3">0</b></div>
</div>

<!-- UPLOAD -->
<div class="upload-grid">

<div class="upload-card">
<div class="upload-title">Comparativo de Estoque</div>
<label class="upload-btn">
📁 Carregar Comparativo
<input type="file" id="file1">
</label>
<div class="bar"><div id="b1" class="bar-fill"></div></div>
<div class="status" id="s1">Aguardando arquivo</div>
</div>

<div class="upload-card">
<div class="upload-title">Mapa de Apanha</div>
<label class="upload-btn">
📍 Carregar Apanha
<input type="file" id="file2">
</label>
<div class="bar"><div id="b2" class="bar-fill"></div></div>
<div class="status" id="s2">Aguardando arquivo</div>
</div>

<div class="upload-card">
<div class="upload-title">Estoque Pulmão</div>
<label class="upload-btn">
🏭 Carregar Pulmão
<input type="file" id="file3">
</label>
<div class="bar"><div id="b3" class="bar-fill"></div></div>
<div class="status" id="s3">Aguardando arquivo</div>
</div>

</div>

<!-- FILTROS -->
<div class="filters">
<input id="f1" placeholder="Código" oninput="filtrar()">
<input id="f2" placeholder="Descrição" oninput="filtrar()">
<input id="f3" placeholder="Local" oninput="filtrar()">
<input id="f4" placeholder="Valor mínimo" oninput="filtrar()">
</div>

<!-- BOTÕES -->
<div class="actions">
<button class="btn" onclick="ordenar('maior')">⬆ Maior valor</button>
<button class="btn" onclick="ordenar('menor')">⬇ Menor valor</button>
<button class="btn" onclick="exportar()">📊 Excel</button>
<button class="btn" onclick="imprimir()">🖨 Imprimir</button>
</div>

<!-- TABELA -->
<div class="table">
<table>
<thead>
<tr>
<th>Código</th>
<th>Descrição</th>
<th>Local</th>
<th>Qtd</th>
<th>Valor</th>
<th>Apanha</th>
<th>Pulmão</th>
</tr>
</thead>
<tbody id="tb"></tbody>
</table>
</div>

</div>

<script>

let base=[],view=[];
let apanha={},pulmao={};

function norm(v){
return String(v||'').trim().replace(/\s/g,'').replace(/^0+/,'');
}

/* KPI */
function kpi(){
document.getElementById('k1').innerText=base.length;

let a=0,p=0;
for(let k in apanha)a+=apanha[k].length;
for(let k in pulmao)p+=pulmao[k].length;

document.getElementById('k2').innerText=a;
document.getElementById('k3').innerText=p;
}

/* PROGRESS */
function prog(bar,status,t,p){
document.getElementById(bar).style.width=p+'%';
document.getElementById(status).innerText=t;
}

/* COMPARATIVO (OTIMIZADO) */
file1.onchange=e=>{
prog('b1','s1','Processando...',10);

const file=e.target.files[0];
const r=new FileReader();

r.onload=ev=>{
const l=ev.target.result.split(/\r?\n/);

base=[];
let i=1;

function chunk(){

const end=Math.min(i+2000,l.length);

for(;i<end;i++){
const c=l[i].split(';');
if(c.length<8)continue;

base.push({
codigo:norm(c[0]),
desc:c[1],
local:c[2],
qtd:+(c[6]||0),
valor:Math.abs(+(c[9]||0))
});
}

prog('b1','s1',`Carregando ${Math.round(i/l.length*100)}%`,40+(i/l.length*60));

if(i<l.length){
setTimeout(chunk,0);
}else{
view=[...base];
render(view);
kpi();
prog('b1','s1','Concluído ✔',100);
}
}

chunk();
};

r.readAsText(file,'latin1');
};

/* APANHA */
file2.onchange=e=>{
prog('b2','s2','Carregando...',20);

const r=new FileReader();

r.onload=ev=>{
const l=ev.target.result.split(/\r?\n/);
apanha={};

for(let i=1;i<l.length;i++){
const c=l[i].split(';');
if(c.length<6)continue;

const cod=norm(c[5]);
if(!cod)continue;

if(!apanha[cod])apanha[cod]=[];
apanha[cod].push(c[0]);
}

kpi();
prog('b2','s2','OK ✔',100);
};

r.readAsText(e.target.files[0],'latin1');
};

/* PULMÃO */
file3.onchange=e=>{
prog('b3','s3','Carregando...',20);

const r=new FileReader();

r.onload=ev=>{
const l=ev.target.result.split(/\r?\n/);
pulmao={};

for(let i=1;i<l.length;i++){
const c=l[i].split(';');
if(c.length<6)continue;

const cod=norm(c[5]);
if(!cod)continue;

if(!pulmao[cod])pulmao[cod]=[];
pulmao[cod].push(1);
}

kpi();
prog('b3','s3','OK ✔',100);
};

r.readAsText(e.target.files[0],'latin1');
};

/* RENDER */
function render(arr){

const tb=document.getElementById('tb');
tb.innerHTML='';

arr.forEach(x=>{
tb.innerHTML+=`
<tr>
<td>${x.codigo}</td>
<td>${x.desc}</td>
<td>${x.local}</td>
<td>${x.qtd}</td>
<td>${x.valor.toFixed(2)}</td>
<td>${apanha[x.codigo]?.length||'SEM'}</td>
<td>${pulmao[x.codigo]?.length||0}</td>
</tr>`;
});
}

/* FILTRO */
function filtrar(){

const a=f1.value.toLowerCase();
const b=f2.value.toLowerCase();
const c=f3.value.toLowerCase();
const d=+f4.value||0;

view=base.filter(x=>
(!a||x.codigo.includes(a))&&
(!b||x.desc.toLowerCase().includes(b))&&
(!c||x.local.toLowerCase().includes(c))&&
(!d||x.valor>=d)
);

render(view);
}

/* ORDENAR */
function ordenar(t){
if(t==='maior')view.sort((a,b)=>b.valor-a.valor);
if(t==='menor')view.sort((a,b)=>a.valor-b.valor);
render(view);
}

/* EXCEL */
function exportar(){

const data=view.map(x=>({
Codigo:x.codigo,
Desc:x.desc,
Local:x.local,
Qtd:x.qtd,
Valor:x.valor,
Apanha:(apanha[x.codigo]||[]).length,
Pulmao:(pulmao[x.codigo]||[]).length
}));

const ws=XLSX.utils.json_to_sheet(data);
const wb=XLSX.utils.book_new();
XLSX.utils.book_append_sheet(wb,ws,'CD107');
XLSX.writeFile(wb,'CD107.xlsx');
}

/* PRINT */
function imprimir(){
window.print();
}

</script>

</body>
</html>
